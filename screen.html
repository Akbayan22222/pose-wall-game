<!DOCTYPE html>
<html>
<head>
    <title>NEON POSE SCREEN</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 50px; box-sizing: border-box;
            color: #fff; text-shadow: 0 0 10px #0ff; font-size: 30px;
        }
        .score-box { border: 2px solid #0ff; padding: 10px 20px; border-radius: 10px; background: rgba(0,255,255,0.1); }
    </style>
</head>
<body>
    <div id="ui">
        <div class="score-box">P1: <span id="score1">0</span></div>
        <div id="level-info" style="color: gold;">LEVEL: EASY</div>
        <div class="score-box" style="border-color: #f0f; text-shadow: 0 0 10px #f0f;">P2: <span id="score2">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const SCREEN_ID = 'neon_game_screen_2026';
        const peer = new Peer(SCREEN_ID);
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let player1Poses = null;

        // 1. Прием данных от контроллера
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data.type === 'POSE_DATA') {
                    player1Poses = data.landmarks;
                }
            });
        });

        // 2. Функция рисования неонового скелета
        function drawNeonSkeleton(landmarks, color) {
            if (!landmarks) return;

            ctx.shadowBlur = 20;
            ctx.shadowColor = color;
            ctx.strokeStyle = color;
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';

            // Соединения костей (индексы MediaPipe)
            const connections = [
                [11, 12], [11, 13], [13, 15], [12, 14], [14, 16], // Руки
                [11, 23], [12, 24], [23, 24], // Торс
                [23, 25], [25, 27], [24, 26], [26, 28] // Ноги
            ];

            ctx.beginPath();
            connections.forEach(([i, j]) => {
                const pt1 = landmarks[i];
                const pt2 = landmarks[j];
                ctx.moveTo(pt1.x * canvas.width, pt1.y * canvas.height);
                ctx.lineTo(pt2.x * canvas.width, pt2.y * canvas.height);
            });
            ctx.stroke();

            // Рисуем голову (упрощенно)
            ctx.beginPath();
            ctx.arc(landmarks[0].x * canvas.width, landmarks[0].y * canvas.height, 30, 0, Math.PI*2);
            ctx.stroke();
        }

        // 3. Главный цикл игры
        function gameLoop() {
            // Очистка с эффектом шлейфа (motion blur)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Рисуем "Неоновый тоннель" (сетка на полу)
            drawGrid();

            // Рисуем игрока
            drawNeonSkeleton(player1Poses, '#00ffff');

            requestAnimationFrame(gameLoop);
        }

        function drawGrid() {
            ctx.strokeStyle = '#111';
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=50) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
        }

        gameLoop();
    </script>
</body>
</html>
