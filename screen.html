<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NEON POSE MASTER - ULTRA</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial Black', sans-serif; cursor: none; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 30px; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 60px; box-sizing: border-box;
            color: #fff; pointer-events: none;
        }
        .score-box { 
            border: 4px solid #0ff; padding: 20px; border-radius: 20px; 
            background: rgba(0,255,255,0.1); box-shadow: 0 0 20px #0ff;
            min-width: 150px; text-align: center;
        }
        #center-ui { text-align: center; }
        #distance-bar { width: 300px; height: 10px; background: #222; border: 2px solid gold; margin-top: 10px; position: relative; }
        #distance-fill { width: 0%; height: 100%; background: gold; box-shadow: 0 0 15px gold; transition: 0.1s; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="score-box" id="p1-ui">P1: <span id="score1">0</span></div>
        <div id="center-ui">
            <div id="status-text" style="font-size: 40px; color: gold; text-shadow: 0 0 20px gold;">READY</div>
            <div id="distance-bar"><div id="distance-fill"></div></div>
        </div>
        <div class="score-box" id="p2-ui" style="border-color: #f0f; box-shadow: 0 0 20px #f0f; display: none;">P2: <span id="score2">0</span></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const SCREEN_ID = 'neon_game_screen_2026';
        const peer = new Peer(SCREEN_ID);

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let players = {
            p1: { landmarks: null, score: 0, color: "#00ffff" },
            p2: { landmarks: null, score: 0, color: "#ff00ff" }
        };

        let gameActive = false;
        let multiPlayer = false;
        let wallSpeed = 0.7;
        let currentWall = null;
        let particles = [];

        // 1. СВЯЗЬ
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data.type === 'POSE_DATA') {
                    // Автоматически распределяем игроков
                    if (!multiPlayer) players.p1.landmarks = data.landmarks;
                    else {
                        // Если в кадре два человека, контроллер должен прислать массив
                        if(Array.isArray(data.landmarks)) {
                            players.p1.landmarks = data.landmarks[0];
                            players.p2.landmarks = data.landmarks[1];
                        } else {
                            players.p1.landmarks = data.landmarks;
                        }
                    }
                }
                if (data.type === 'CONTROL') {
                    if (data.command === 'START') { gameActive = true; resetGame(); }
                    if (data.command === 'STOP') gameActive = false;
                    if (data.command === '2PLAYER') { 
                        multiPlayer = !multiPlayer; 
                        document.getElementById('p2-ui').style.display = multiPlayer ? "block" : "none";
                    }
                }
            });
        });

        function resetGame() {
            players.p1.score = 0; players.p2.score = 0;
            document.getElementById('score1').innerText = "0";
            document.getElementById('score2').innerText = "0";
            particles = [];
        }

        // 2. ЭФФЕКТЫ ЧАСТИЦ (Разбитое стекло)
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 20;
                this.vy = (Math.random() - 0.5) * 20;
                this.alpha = 1;
                this.size = Math.random() * 8 + 2;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.alpha -= 0.02;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.size, this.y + this.size/2);
                ctx.lineTo(this.x + this.size/2, this.y + this.size);
                ctx.fill();
                ctx.restore();
            }
        }

        function explode(x, y, w, h, color) {
            for(let i=0; i<30; i++) {
                particles.push(new Particle(x + Math.random()*w, y + Math.random()*h, color));
            }
        }

        // 3. СТЕНЫ
        const poseTemplates = [
            { name: "T", pts: { 15: {x:0.1, y:0.5}, 16: {x:0.9, y:0.5}, 11:{x:0.4,y:0.4} } },
            { name: "Y", pts: { 15: {x:0.2, y:0.1}, 16: {x:0.8, y:0.1} } },
            { name: "Star", pts: { 15: {x:0.15, y:0.2}, 16: {x:0.85, y:0.2}, 27:{x:0.3,y:0.95}, 28:{x:0.7,y:0.95} } }
        ];

        class Wall {
            constructor() {
                this.z = 100;
                this.template = poseTemplates[Math.floor(Math.random()*poseTemplates.length)];
                this.passed = false;
                this.color = "cyan";
            }
            update() {
                this.z -= wallSpeed;
                if (this.z < 2 && !this.passed) {
                    this.check();
                    this.passed = true;
                }
            }
            draw() {
                let s = 100 / (this.z + 1);
                let w = canvas.width * 0.5 * s, h = canvas.height * 0.8 * s;
                let x = (canvas.width - w)/2, y = (canvas.height - h)/2;
                
                ctx.save();
                ctx.shadowBlur = 20; ctx.shadowColor = this.color;
                ctx.strokeStyle = `rgba(0, 255, 255, ${s/10})`;
                ctx.lineWidth = 15;
                ctx.strokeRect(x, y, w, h);
                
                // Рисуем вырезы
                ctx.setLineDash([20, 10]);
                for(let id in this.template.pts) {
                    let pt = this.template.pts[id];
                    ctx.strokeRect(x + pt.x*w - 20, y + pt.y*h - 20, 40, 40);
                }
                ctx.restore();
                
                if (this.z < 2) explode(x, y, w, h, "#0ff");
            }
            check() {
                if (!players.p1.landmarks) return;
                let match = true;
                for(let id in this.template.pts) {
                    let p = players.p1.landmarks[id];
                    let t = this.template.pts[id];
                    let d = Math.sqrt((p.x-t.x)**2 + (p.y-t.y)**2);
                    if (d > 0.25) match = false;
                }
                if(match) { players.p1.score += 100; triggerMsg("PERFECT", "gold"); }
                else { triggerMsg("BOOM!", "red"); }
                document.getElementById('score1').innerText = players.p1.score;
            }
        }

        function triggerMsg(t, c) {
            document.getElementById('status-text').innerText = t;
            document.getElementById('status-text').style.color = c;
            setTimeout(() => { document.getElementById('status-text').innerText = "READY"; }, 1000);
        }

        function drawSkeleton(lm, col) {
            if(!lm) return;
            ctx.shadowBlur = 20; ctx.shadowColor = col;
            ctx.strokeStyle = col; ctx.lineWidth = 12; ctx.lineCap = "round";
            const b = [[11,12],[11,13],[13,15],[12,14],[14,16],[11,23],[12,24],[23,24],[23,25],[25,27],[24,26],[26,28]];
            ctx.beginPath();
            b.forEach(([i,j]) => {
                ctx.moveTo(lm[i].x*canvas.width, lm[i].y*canvas.height);
                ctx.lineTo(lm[j].x*canvas.width, lm[j].y*canvas.height);
            });
            ctx.stroke();
            ctx.beginPath(); ctx.arc(lm[0].x*canvas.width, lm[0].y*canvas.height, 40, 0, Math.PI*2); ctx.stroke();
        }

        function gameLoop() {
            ctx.fillStyle = "rgba(0, 5, 10, 0.4)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Тоннель
            ctx.strokeStyle = "#001a1a"; ctx.lineWidth = 2;
            for(let i=0; i<canvas.width; i+=80) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }

            if(gameActive) {
                if(!currentWall || currentWall.z < -10) currentWall = new Wall();
                currentWall.update();
                currentWall.draw();
                document.getElementById('distance-fill').style.width = (100 - currentWall.z) + "%";
            }

            drawSkeleton(players.p1.landmarks, players.p1.color);
            if(multiPlayer) drawSkeleton(players.p2.landmarks, players.p2.color);

            particles.forEach((p, i) => {
                p.update(); p.draw();
                if(p.alpha <= 0) particles.splice(i, 1);
            });

            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
