<button onclick="start()">START</button>
<button onclick="stop()">STOP</button>

<script type="module">
import { set } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";
import { db } from "./js/realtime.js";

function start() {
  set(ref(db, "game/state"), "start");
}

function stop() {
  set(ref(db, "game/state"), "stop");
}
</script>
